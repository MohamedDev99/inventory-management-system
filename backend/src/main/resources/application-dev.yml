spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}/${DATABASE_NAME}?sslmode=require
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      minimum-idle: 2

  # Redis — required for JWT token blacklist (logout)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: 8080

app:
  cors:
    allowed-origins: "https://5173-firebase-moeware-1771436889408.cluster-ikslh4rdsnbqsvu5nw3v4dqjj2.cloudworkstations.dev" # Vite dev server; change to production URL when deploying

  cookie:
    # Set to true in production (requires HTTPS). Keep false for local HTTP dev.
    secure: true
    # Leave empty for same-domain. Set to ".moeware.com" to share across subdomains.
    domain:
    # Access token cookie TTL in seconds (must match jwt.expiration / 1000)
    access-token-max-age: 86400 # 24 hours
    # Refresh token cookie TTL in seconds (must match jwt.refresh-expiration / 1000)
    refresh-token-max-age: 604800 # 7 days

# OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: none
    default-models-expand-depth: 1
    default-model-expand-depth: 1
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.moeware.ims.controller
  paths-to-match: /api/**
